<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Dedupe</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-on:click="if(!event.target.closest('#dir')) document.getElementById('autocomplete-results').innerHTML=''">
    <header>
        <h1>Image Dedupe</h1>
        <p>Find and remove duplicate images</p>
    </header>

    <main>
        <form hx-post="/api/scan" hx-target="#results" hx-swap="innerHTML" hx-indicator="#spinner">
            <div class="form-row">
                <label for="dir">Directory</label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="dir" name="dir" placeholder="/path/to/images or C:\Users\..." required
                           hx-get="/api/path-autocomplete"
                           hx-trigger="keyup changed delay:300ms"
                           hx-target="#autocomplete-results"
                           hx-include="this"
                           hx-on:keydown="if(event.key==='Escape') document.getElementById('autocomplete-results').innerHTML=''"
                           autocomplete="off"
                           aria-autocomplete="list"
                           aria-controls="autocomplete-results">
                    <div id="autocomplete-results" role="listbox" aria-label="Directory suggestions" aria-live="polite"></div>
                </div>
            </div>
            <div class="form-row">
                <label for="method">Method</label>
                <select id="method" name="method">
                    <option value="exact">Exact (SHA-256)</option>
                    <option value="phash">Perceptual (pHash)</option>
                    <option value="dhash">Perceptual (dHash)</option>
                </select>
            </div>
            <div class="form-row">
                <label for="threshold">Threshold</label>
                <input type="number" id="threshold" name="threshold" value="5" min="0" max="20">
                <span class="hint">Hamming distance for perceptual methods (ignored for exact)</span>
            </div>
            <button type="submit">Scan</button>
        </form>

        <div id="spinner" class="htmx-indicator">Scanning...</div>
        <div id="results"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
