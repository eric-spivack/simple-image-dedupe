{% if matches %}
<div id="autocomplete-backdrop"
     onclick="document.getElementById('autocomplete-results').innerHTML=''"
     style="position: fixed; inset: 0; z-index: 1049;"></div>
<ul class="dropdown-menu show" style="position: relative; width: 100%; max-height: 300px; overflow-y: auto; z-index: 1050;">
  {% for path in matches %}
  <li>
    <a class="dropdown-item" href="#"
       data-path="{{ path }}"
       onclick="document.getElementById('dir').value=this.dataset.path;
                document.getElementById('autocomplete-results').innerHTML='';
                return false;">
      {{ path }}
    </a>
  </li>
  {% endfor %}
</ul>
{% endif %}
